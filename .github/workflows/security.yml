name: security

# Self-contained SAST + secret scan (gitleaks + semgrep + njsscan).
# Inlined rather than calling the reusable workflow in fastrevmd-lab/security-review:
# GitHub does not allow a public repo to call a reusable workflow in a private repo.
# Keep these steps in sync with security-review/.github/workflows/security-review.yml.
# Actions are pinned to commit SHAs; tool versions are pinned to releases.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: SAST + secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: gitleaks (secrets)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Install semgrep + njsscan (pinned, isolated)
        # pipx gives each tool its own venv; semgrep and njsscan have
        # conflicting transitive deps and cannot share one environment.
        run: |
          pipx install semgrep==1.170.0
          pipx install njsscan==0.4.3

      - name: semgrep (SAST)
        run: semgrep scan --error --config p/javascript --config p/react --config p/secrets .
        env:
          SEMGREP_TIMEOUT: "300"

      - name: njsscan (node-specific, report-only)
        # Non-blocking: njsscan's keyword rules (node_secret/node_api_key)
        # structurally false-positive on this repo because it *generates*
        # firewall config full of the literal words "secret"/"api key"
        # (verified: all ERROR findings are variable names / Junos keyword
        # literals / sanitized placeholders, not real secrets). gitleaks +
        # semgrep are the hard gates; njsscan output stays visible for triage.
        continue-on-error: true
        run: njsscan --exit-warning src public
