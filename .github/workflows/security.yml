name: security

# Self-contained SAST + secret scan (gitleaks + semgrep + njsscan).
# Inlined rather than calling the reusable workflow in fastrevmd-lab/security-review:
# GitHub does not allow a public repo to call a reusable workflow in a private repo.
# Keep these steps in sync with security-review/.github/workflows/security-review.yml.
# Actions are pinned to commit SHAs; tool versions are pinned to releases.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: SAST + secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: gitleaks (secrets)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Install semgrep + njsscan (pinned)
        run: python3 -m pip install --quiet semgrep==1.170.0 njsscan==0.4.3

      - name: semgrep (SAST)
        run: semgrep scan --error --config p/javascript --config p/react --config p/secrets .
        env:
          SEMGREP_TIMEOUT: "300"

      - name: njsscan (node-specific)
        run: njsscan --exit-warning .
